{% extends "base.html" %}
{% block title %}Login | Job Title Identification{% endblock %}
{% block content %}
<section class="auth-shell">
    <form class="auth-card" method="post" action="{{ url_for('login') }}">
        <h1>Login</h1>
        {% if message %}<div class="alert {{ 'success' if success else 'error' }}">{{ message }}</div>{% endif %}
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
        <button class="primary-button" type="submit">Login</button>
        <p>New user? <a href="{{ url_for('signup') }}">Create an account</a></p>
    </form>
</section>
{% endblock %}
