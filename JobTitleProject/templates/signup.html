{% extends "base.html" %}
{% block title %}Signup | Job Title Identification{% endblock %}
{% block content %}
<section class="auth-shell">
    <form class="auth-card" method="post" action="{{ url_for('signup') }}">
        <h1>Create Account</h1>
        {% if message %}<div class="alert {{ 'success' if success else 'error' }}">{{ message }}</div>{% endif %}
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required>
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required>
        <label>Password</label>
        <input type="password" name="password" minlength="6" placeholder="Minimum 6 characters" required>
        <button class="primary-button" type="submit">Signup</button>
        <p>Already registered? <a href="{{ url_for('login') }}">Login</a></p>
    </form>
</section>
{% endblock %}
